<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master HTML Converter</title>
<script src="libs/jspdf.umd.min.js"></script>
<script src="libs/html2canvas.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Tahoma,sans-serif; }
  body {
    background: linear-gradient(135deg,#667eea 0%,#764ba2 100%);
    min-height:100vh; padding:20px; color:#333;
  }
  .container {
    max-width:1100px; margin:0 auto;
    background:rgba(255,255,255,0.97);
    border-radius:20px; padding:30px;
    box-shadow:0 20px 60px rgba(0,0,0,0.3);
    backdrop-filter:blur(10px);
  }
  header { text-align:center; margin-bottom:25px; }
  header h1 {
    font-size:2.2rem;
    background:linear-gradient(135deg,#667eea,#764ba2);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    margin-bottom:5px;
  }
  header p { color:#666; font-size:0.95rem; }

  .grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:12px; margin-bottom:20px;
  }
  .field { display:flex; flex-direction:column; }
  .field label {
    font-size:0.85rem; font-weight:600;
    color:#555; margin-bottom:5px;
  }
  select, input[type="text"], input[type="number"] {
    padding:10px; border:2px solid #e0e0e0;
    border-radius:8px; font-size:0.9rem;
    background:#fff; transition:.3s;
  }
  select:focus, input:focus {
    outline:none; border-color:#667eea;
    box-shadow:0 0 0 3px rgba(102,126,234,0.2);
  }

  .margins {
    display:grid; grid-template-columns:repeat(4,1fr);
    gap:8px; margin-bottom:20px;
    padding:15px; background:#f8f9ff;
    border-radius:10px; border:2px dashed #c5cdf5;
  }
  .margins .field label { font-size:0.8rem; }

  textarea {
    width:100%; min-height:220px;
    padding:15px; border:2px solid #e0e0e0;
    border-radius:10px; font-family:'Courier New',monospace;
    font-size:0.9rem; resize:vertical;
    transition:.3s;
  }
  textarea:focus {
    outline:none; border-color:#667eea;
    box-shadow:0 0 0 3px rgba(102,126,234,0.2);
  }

  .meta {
    display:flex; justify-content:space-between;
    font-size:0.8rem; color:#777; margin:5px 2px 15px;
  }

  .buttons {
    display:flex; flex-wrap:wrap; gap:10px;
    margin-bottom:20px;
  }
  button {
    flex:1; min-width:130px;
    padding:12px 20px; border:none;
    border-radius:10px; font-size:0.95rem;
    font-weight:600; cursor:pointer;
    transition:.3s; color:#fff;
  }
  button:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(0,0,0,0.2); }
  button:active { transform:translateY(0); }
  .btn-preview { background:linear-gradient(135deg,#4facfe,#00f2fe); }
  .btn-download { background:linear-gradient(135deg,#11998e,#38ef7d); }
  .btn-load { background:linear-gradient(135deg,#f093fb,#f5576c); }
  .btn-example { background:linear-gradient(135deg,#fa709a,#fee140); }
  .btn-clear { background:linear-gradient(135deg,#868f96,#596164); }

  #preview {
    width:100%; min-height:300px;
    border:2px solid #e0e0e0; border-radius:10px;
    background:#fff; padding:15px;
    overflow:auto;
  }
  .preview-header {
    display:flex; justify-content:space-between;
    align-items:center; margin-bottom:10px;
  }
  .preview-header h3 { color:#555; }
  .fullscreen-btn {
    background:#667eea; color:#fff; border:none;
    padding:6px 12px; border-radius:6px;
    cursor:pointer; font-size:0.8rem;
  }

  .toast {
    position:fixed; bottom:20px; left:50%;
    transform:translateX(-50%);
    background:#333; color:#fff;
    padding:12px 25px; border-radius:30px;
    box-shadow:0 5px 20px rgba(0,0,0,0.3);
    opacity:0; transition:.4s; z-index:9999;
  }
  .toast.show { opacity:1; bottom:40px; }
  .toast.success { background:linear-gradient(135deg,#11998e,#38ef7d); }
  .toast.error { background:linear-gradient(135deg,#eb3349,#f45c43); }

  .loader {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.7); z-index:9998;
    justify-content:center; align-items:center;
    flex-direction:column; color:#fff;
  }
  .loader.show { display:flex; }
  .spinner {
    width:60px; height:60px;
    border:5px solid rgba(255,255,255,0.3);
    border-top-color:#fff; border-radius:50%;
    animation:spin 1s linear infinite;
    margin-bottom:15px;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  .fullscreen #preview {
    position:fixed; inset:0; z-index:9997;
    border-radius:0; min-height:100vh;
  }

  @media(max-width:600px){
    header h1{font-size:1.6rem;}
    .container{padding:20px 15px;}
    button{min-width:100%;}
    .margins{grid-template-columns:repeat(2,1fr);}
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>🎨 Master HTML Converter</h1>
    <p>Convertissez votre code HTML en PDF — 100% Offline</p>
  </header>

  <div class="grid">
    <div class="field">
      <label>📄 Format</label>
      <select id="format">
        <option value="a4">A4</option>
        <option value="a3">A3</option>
        <option value="a5">A5</option>
        <option value="letter">Letter</option>
        <option value="legal">Legal</option>
      </select>
    </div>
    <div class="field">
      <label>🔄 Orientation</label>
      <select id="orientation">
        <option value="portrait">Portrait</option>
        <option value="landscape">Paysage</option>
      </select>
    </div>
    <div class="field">
      <label>📑 Mode de page</label>
      <select id="pageMode">
        <option value="multi">Pages multiples</option>
        <option value="single">Page longue unique</option>
      </select>
    </div>
    <div class="field">
      <label>✨ Qualité</label>
      <select id="quality">
        <option value="1">Standard</option>
        <option value="2" selected>Haute (2x)</option>
        <option value="3">Très haute (3x)</option>
      </select>
    </div>
    <div class="field">
      <label>💾 Nom du fichier</label>
      <input type="text" id="filename" value="document" placeholder="document">
    </div>
  </div>

  <div class="margins">
    <div class="field">
      <label>⬆ Marge haut (mm)</label>
      <input type="number" id="mTop" value="10" min="0" max="50">
    </div>
    <div class="field">
      <label>⬇ Marge bas (mm)</label>
      <input type="number" id="mBottom" value="10" min="0" max="50">
    </div>
    <div class="field">
      <label>⬅ Marge gauche (mm)</label>
      <input type="number" id="mLeft" value="10" min="0" max="50">
    </div>
    <div class="field">
      <label>➡ Marge droite (mm)</label>
      <input type="number" id="mRight" value="10" min="0" max="50">
    </div>
  </div>

  <label style="font-weight:600;color:#555;display:block;margin-bottom:5px;">📝 Code HTML</label>
  <textarea id="htmlInput" placeholder="Collez votre code HTML ici..."></textarea>
  <div class="meta">
    <span id="charCount">0 caractères</span>
    <span>💾 Sauvegarde automatique activée</span>
  </div>

  <div class="buttons">
    <button class="btn-example" onclick="loadExample()">✨ Exemple</button>
    <button class="btn-load" onclick="document.getElementById('fileInput').click()">📂 Charger</button>
    <input type="file" id="fileInput" accept=".html,.htm,.txt" style="display:none">
    <button class="btn-preview" onclick="previewHTML()">👁️ Prévisualiser</button>
    <button class="btn-download" onclick="downloadPDF()">📥 Télécharger PDF</button>
    <button class="btn-clear" onclick="clearAll()">🗑️ Effacer</button>
  </div>

  <div class="preview-header">
    <h3>👁️ Aperçu</h3>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Plein écran</button>
  </div>
  <div id="preview"><p style="color:#999;text-align:center;padding:40px;">Aucun aperçu pour le moment...</p></div>
</div>

<div class="toast" id="toast"></div>
<div class="loader" id="loader">
  <div class="spinner"></div>
  <p>Génération du PDF en cours...</p>
</div>

<script>
  const $ = id => document.getElementById(id);
  const htmlInput = $('htmlInput');
  const preview = $('preview');

  // Comp
